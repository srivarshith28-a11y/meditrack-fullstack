spring.application.name=MediTrack

server.port=8080

spring.datasource.url=${MEDITRAK_DB_URL:jdbc:mysql://localhost:3306/meditrak}
spring.datasource.username=${MEDITRAK_DB_USERNAME:meditrak_user}
spring.datasource.password=${MEDITRAK_DB_PASSWORD:change_me}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.mvc.view.prefix=/WEB-INF/jsp/
spring.mvc.view.suffix=.jsp

spring.web.resources.static-locations=classpath:/static/

spring.sql.init.mode=never
spring.jpa.open-in-view=false
